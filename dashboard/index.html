<!DOCTYPE html>

<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Branch Governance Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="header-left">
      <h1>Branch Governance</h1>
      <span class="subtitle">Auditoría de sincronización de repositorios</span>
    </div>

    <div class="header-right">
      <div class="kpi">
        <span class="kpi-label">Repos</span>
        <span id="totalRepos" class="kpi-value">-</span>
      </div>
      <div class="kpi">
        <span class="kpi-label">Ramas</span>
        <span id="totalBranches" class="kpi-value">-</span>
      </div>

      <div class="kpi">
        <span class="kpi-label">Última ejecución</span>
        <span id="generatedAt" class="kpi-value small">-</span>
      </div>

    </div>
  </header>

  <main class="container">

    <section class="summary">
      <h2>Resumen general</h2>
      <div id="summaryCards" class="cards"></div>
    </section>

    <section class="repos">
      <h2>Repositorios</h2>
      <input type="text" id="searchInput" placeholder="Filtrar repositorio..." class="search">

      <div class="table-wrapper">
        <table id="reposTable">
          <thead>
            <tr>
              <th>Repositorio</th>
              <th>Estado</th>
              <th>Ramas</th>
              <th>Behind</th>
              <th>Diverged</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </section>

  </main>

  <footer class="footer">
    Generado automáticamente por GitHub Branch Auditor
  </footer>

  <script src="app.js"></script>

</body>

</html>
