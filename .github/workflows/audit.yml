name: Auditoría de Repositorios

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Repos auditados en paralelo (default: 5)"
        required: false
        default: "5"
  schedule:
    - cron: "0 11 * * 1" # Lunes 6:00am Colombia (11:00 UTC)

env:
  ORG: juanlopnz-org
  INACTIVITY_DAYS: 30
  AUDIT_CONCURRENCY: ${{ inputs.concurrency || '5' }}
  SHAREPOINT_SITE_NAME: AuditReports

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run auditor
        run: node scripts/audit-branches.js
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ORG: ${{ env.ORG }}
          INACTIVITY_DAYS: ${{ env.INACTIVITY_DAYS }}
          AUDIT_CONCURRENCY: ${{ env.AUDIT_CONCURRENCY }}

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Copy report to dashboard
        if: success()
        run: |
          cp output/report.json dashboard/report.json

      - name: Setup Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: success()
        uses: actions/upload-pages-artifact@v3

        with:
          path: dashboard
      - name: Deploy to GitHub Pages
        if: success()
        uses: actions/deploy-pages@v4
      - name: Generate HTML report
        run: node scripts/generate-html-report.js
      - name: Upload report to SharePoint
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_SITE_NAME: ${{ env.SHAREPOINT_SITE_NAME }}
        run: node scripts/upload-to-sharepoint.js
